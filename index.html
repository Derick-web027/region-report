<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>区域分析报告生成器</title>
<style>
  :root{ --brand:#c1622d; --brand-d:#a9521f; --ink:#222; --mut:#8a8f96; --line:#e8eaed; --bg:#f4f5f7; }
  *{ box-sizing:border-box; }
  body{ font-family:-apple-system,"Microsoft YaHei","微软雅黑",sans-serif; margin:0; background:var(--bg); color:var(--ink); }
  .wrap{ max-width:1000px; margin:0 auto; padding:36px 20px 70px; }
  .head h1{ font-size:26px; margin:0 0 8px; }
  .head p{ color:var(--mut); font-size:14px; margin:0; line-height:1.7; }
  .bar{ position:sticky; top:0; z-index:5; background:var(--bg); padding:18px 0 14px; margin-top:18px; }
  .search{ position:relative; max-width:420px; }
  .search input{ width:100%; font-family:inherit; font-size:15px; padding:12px 14px 12px 38px;
    border:1px solid #d4d7db; border-radius:10px; background:#fff; outline:none; }
  .search input:focus{ border-color:var(--brand); }
  .search svg{ position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.45; }
  .count{ color:var(--mut); font-size:13px; margin-top:8px; }
  .prov{ margin-top:22px; }
  .prov h2{ font-size:15px; color:var(--brand); margin:0 0 12px; font-weight:700;
    border-left:3px solid var(--brand); padding-left:9px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
  .city{ display:flex; align-items:center; justify-content:space-between; gap:6px;
    background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px 14px;
    cursor:pointer; transition:.15s; font-size:15px; }
  .city:hover{ border-color:var(--brand); box-shadow:0 2px 8px rgba(193,98,45,.12); transform:translateY(-1px); }
  .city .dl{ color:var(--brand); opacity:0; transition:.15s; font-size:13px; white-space:nowrap; }
  .city:hover .dl{ opacity:1; }
  .empty{ color:var(--mut); font-size:14px; padding:30px 0; text-align:center; }
  #toast{ position:fixed; left:50%; bottom:34px; transform:translateX(-50%) translateY(20px);
    background:#1f9254; color:#fff; padding:11px 20px; border-radius:10px; font-size:14px;
    opacity:0; pointer-events:none; transition:.25s; box-shadow:0 4px 16px rgba(0,0,0,.18); }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  details{ margin-top:26px; font-size:13px; color:#666; }
  summary{ cursor:pointer; color:var(--brand); }
  details p{ line-height:1.8; }
  .foot{ font-size:12px; color:var(--mut); text-align:center; margin-top:30px; line-height:1.8; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>区域分析报告生成器</h1>
    <p>点击城市即可下载该地区的「城投区域分析报告」（Word）。报告按统一框架撰写，涵盖区域经济、财政与政府债务、土地与房地产市场。</p>
  </div>

  <div class="bar">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="搜索城市，如 苏州、武汉、厦门…" autocomplete="off">
    </div>
    <div class="count" id="count"></div>
  </div>

  <div id="list"></div>

  <details>
    <summary>关于报告内容与口径</summary>
    <p>· 全部数值、同比增速、累计跌幅、省内排名与 GDP 倍数、二手房冰山指数跌幅，均由区域数据库自动计算；<br>
       · 行政定位、支柱产业与龙头企业等定性内容，依据各市经济画像撰写；<br>
       · 仅覆盖已维护土地市场数据的地级市；其余城市暂不在本站收录范围。</p>
  </details>

  <div class="foot">
    数据来源：企业预警通、中指数据库、Wind 等，风控信评部整理，仅供研究参考。<br>
    <span id="gen"></span>
  </div>
</div>

<div id="toast"></div>
<a id="anchor" style="display:none"></a>

<script src="manifest.js"></script>
<script>
const M = window.MANIFEST || {provinces:[], data:{}};
const $ = id => document.getElementById(id);
let TOTAL = 0;

function build(filter){
  filter = (filter||"").trim();
  const list = $("list"); list.innerHTML="";
  let shown = 0;
  for(const prov of M.provinces){
    const cities = (M.data[prov]||[]).filter(e => !filter || e.city.includes(filter));
    if(!cities.length) continue;
    const sec = document.createElement("div"); sec.className="prov";
    sec.innerHTML = `<h2>${prov}</h2>`;
    const grid = document.createElement("div"); grid.className="grid";
    for(const e of cities){
      shown++;
      const card = document.createElement("div"); card.className="city";
      card.innerHTML = `<span>${e.city}</span><span class="dl">下载 ↓</span>`;
      card.addEventListener("click", ()=>download(e));
      grid.appendChild(card);
    }
    sec.appendChild(grid); list.appendChild(sec);
  }
  if(!shown){ list.innerHTML = `<div class="empty">未找到匹配“${filter}”的城市</div>`; }
  $("count").textContent = filter ? `匹配 ${shown} 个城市` : `共收录 ${TOTAL} 个地级市`;
}

function download(e){
  const a = $("anchor");
  a.href = e.file; a.download = e.name; a.click();
  const t = $("toast"); t.textContent = "✓ 已开始下载：" + e.name;
  t.classList.add("show"); clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.classList.remove("show"), 2600);
}

TOTAL = M.provinces.reduce((s,p)=>s+(M.data[p]||[]).length,0);
$("q").addEventListener("input", ev => build(ev.target.value));
$("gen").textContent = "数据更新日期：" + (M.generated||"—") + " ｜ 覆盖 " + TOTAL + " 个地级市";
build("");
</script>
</body>
</html>
